<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sophia — Void DAW</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --void:#050508;
  --ley-1:#4af4c8;--ley-2:#7b6fff;--ley-3:#f45a8d;
  --gold:#e8c97a;--ivory:#f0ede8;--celestial:#b8d4ff;
  --panel:rgba(10,10,18,0.92);--border:rgba(74,244,200,0.18);
  --border-gold:rgba(232,201,122,0.22);
  --text-main:#d8eef8;--text-muted:rgba(184,212,255,0.45);
  --mono:'Share Tech Mono',monospace;--serif:'Cinzel',serif;--body:'Cormorant Garamond',serif;
  --choir:#b8d4ff;--strings:#e8c97a;
}

body{background:var(--void);overflow:hidden;}

#sophia-root{
  background:var(--void);color:var(--text-main);font-family:var(--mono);
  height:640px;width:100%;position:relative;overflow:hidden;
  display:flex;flex-direction:column;border-radius:12px;
}

/* ── BACKGROUND ── */
#sophia-bg{position:absolute;inset:0;pointer-events:none;z-index:0;}

/* ── HEADER ── */
header{
  display:flex;align-items:center;gap:12px;padding:11px 18px 9px;
  border-bottom:0.5px solid var(--border-gold);position:relative;z-index:5;
  background:rgba(5,5,8,0.6);backdrop-filter:blur(4px);
}
header h1{
  font-family:var(--serif);font-size:14px;font-weight:600;letter-spacing:0.22em;
  color:var(--gold);text-transform:uppercase;
}
header .sub{font-size:10px;color:var(--text-muted);letter-spacing:0.12em;font-family:var(--mono);}
header .mode-tag{
  font-family:var(--body);font-style:italic;font-size:12px;
  color:var(--celestial);letter-spacing:0.05em;margin-left:4px;
  border-left:0.5px solid var(--border);padding-left:10px;
}
.status-dot{
  width:6px;height:6px;border-radius:50%;background:var(--gold);
  margin-left:auto;animation:pulse-gold 3s ease-in-out infinite;
  box-shadow:0 0 6px rgba(232,201,122,0.6);
}
@keyframes pulse-gold{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.85)}}

/* ── MAIN AREA ── */
.main-area{display:grid;grid-template-columns:1fr 196px;flex:1;min-height:0;position:relative;z-index:2;}
.left-col{display:flex;flex-direction:column;border-right:0.5px solid var(--border-gold);}

/* ── VOICE DISPLAY ── */
.voice-display{
  padding:10px 14px 8px;border-bottom:0.5px solid var(--border-gold);
  display:flex;gap:14px;align-items:stretch;
}
#voice-canvas{
  border-radius:6px;border:0.5px solid rgba(232,201,122,0.25);
  flex-shrink:0;background:rgba(0,0,8,0.8);
}
.voice-info{flex:1;display:flex;flex-direction:column;gap:5px;}
.vi-title{
  font-family:var(--body);font-style:italic;font-size:16px;color:var(--gold);
  letter-spacing:0.06em;margin-bottom:2px;
}
.vi-row{display:flex;justify-content:space-between;font-size:10px;letter-spacing:0.1em;}
.vi-label{color:var(--text-muted);text-transform:uppercase;}
.vi-val{color:var(--celestial);}
.vi-val.gold{color:var(--gold);}
.vi-val.pink{color:var(--ley-3);}
#voice-name{
  font-size:11px;color:var(--gold);font-family:var(--body);font-style:italic;
  letter-spacing:0.08em;
}

/* ── SECTION TOGGLE (CHOIR / STRINGS) ── */
.mode-strip{
  display:flex;border-bottom:0.5px solid var(--border-gold);
}
.mode-tab{
  flex:1;padding:6px 0;text-align:center;
  font-family:var(--mono);font-size:9px;letter-spacing:0.14em;text-transform:uppercase;
  cursor:pointer;color:var(--text-muted);border:none;background:transparent;
  transition:all 0.2s;position:relative;overflow:hidden;
}
.mode-tab::after{
  content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:0;height:1px;background:var(--gold);transition:width 0.3s;
}
.mode-tab:hover{color:var(--text-main);}
.mode-tab.active{color:var(--gold);}
.mode-tab.active::after{width:60%;}
.mode-tab.strings.active{color:var(--celestial);}
.mode-tab.strings.active::after{background:var(--celestial);}

/* ── KEYBOARD ── */
.keyboard-section{padding:10px 14px 8px;display:flex;flex-direction:column;gap:10px;flex:1;}
.kb-header{display:flex;align-items:center;gap:8px;}
.kb-hint{font-size:9px;color:var(--text-muted);letter-spacing:0.08em;margin-left:auto;}
#keyboard{position:relative;height:100px;user-select:none;}

.wkey{
  position:absolute;bottom:0;height:100px;
  background:linear-gradient(180deg,rgba(8,10,20,0.9) 0%,rgba(12,16,28,0.95) 100%);
  border:0.5px solid rgba(184,212,255,0.15);border-radius:0 0 4px 4px;
  cursor:pointer;transition:background 0.06s;
  display:flex;align-items:flex-end;justify-content:center;
  padding-bottom:5px;font-size:9px;color:rgba(184,212,255,0.3);
}
.wkey:hover{
  background:linear-gradient(180deg,rgba(184,212,255,0.07) 0%,rgba(184,212,255,0.12) 100%);
  border-color:rgba(184,212,255,0.35);color:var(--celestial);
}
.wkey.active{
  background:linear-gradient(180deg,rgba(232,201,122,0.1) 0%,rgba(232,201,122,0.2) 100%);
  border-color:rgba(232,201,122,0.5);color:var(--gold);
  box-shadow:0 0 16px rgba(232,201,122,0.12) inset,0 0 8px rgba(232,201,122,0.08);
}

.bkey{
  position:absolute;top:0;height:62px;z-index:2;cursor:pointer;
  background:linear-gradient(180deg,rgba(184,212,255,0.08) 0%,rgba(5,5,20,0.95) 100%);
  border:0.5px solid rgba(184,212,255,0.22);border-radius:0 0 3px 3px;
  transition:background 0.06s;
}
.bkey:hover{
  background:linear-gradient(180deg,rgba(123,111,255,0.25) 0%,rgba(123,111,255,0.1) 100%);
  border-color:var(--ley-2);box-shadow:0 0 10px rgba(123,111,255,0.2) inset;
}
.bkey.active{
  background:linear-gradient(180deg,rgba(244,90,141,0.3) 0%,rgba(244,90,141,0.12) 100%);
  border-color:var(--ley-3);box-shadow:0 0 14px rgba(244,90,141,0.25) inset;
}

/* ── ENV ── */
.env-row{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.ctrl-group label{font-size:9px;letter-spacing:0.14em;color:var(--text-muted);text-transform:uppercase;display:block;margin-bottom:5px;}
.ctrl-group .val{color:var(--gold);float:right;}
input[type=range]{-webkit-appearance:none;width:100%;height:2px;background:rgba(184,212,255,0.12);border-radius:2px;outline:none;border:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:var(--gold);cursor:pointer;box-shadow:0 0 5px rgba(232,201,122,0.5);}
input[type=range].blue::-webkit-slider-thumb{background:var(--celestial);box-shadow:0 0 5px rgba(184,212,255,0.5);}
input[type=range].pink::-webkit-slider-thumb{background:var(--ley-3);box-shadow:0 0 5px rgba(244,90,141,0.5);}

/* ── RIGHT CONTROLS ── */
.controls-section{
  padding:12px 12px;display:flex;flex-direction:column;gap:11px;
  overflow-y:auto;
}
.ctrl-group label .val{color:var(--celestial);}
.ctrl-group label .val.gold{color:var(--gold);}

.section-head{
  font-size:9px;letter-spacing:0.18em;color:var(--text-muted);
  text-transform:uppercase;border-bottom:0.5px solid var(--border-gold);
  padding-bottom:5px;margin-bottom:3px;font-family:var(--mono);
}

/* Voice preset buttons */
.voices-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.voice-btn{
  padding:4px 3px;background:transparent;border:0.5px solid rgba(232,201,122,0.2);
  border-radius:3px;color:var(--text-muted);font-family:var(--body);font-style:italic;
  font-size:10px;cursor:pointer;transition:all 0.15s;text-align:center;
}
.voice-btn:hover{border-color:var(--gold);color:var(--gold);}
.voice-btn.active{
  background:rgba(232,201,122,0.08);border-color:var(--gold);color:var(--gold);
}
.voice-btn.str{border-color:rgba(184,212,255,0.2);color:var(--text-muted);}
.voice-btn.str:hover{border-color:var(--celestial);color:var(--celestial);}
.voice-btn.str.active{background:rgba(184,212,255,0.08);border-color:var(--celestial);color:var(--celestial);}

/* Ensemble control */
.ensemble-row{display:flex;gap:3px;}
.ens-btn{
  flex:1;padding:4px 0;background:transparent;border:0.5px solid rgba(74,244,200,0.15);
  border-radius:3px;color:var(--text-muted);font-family:var(--mono);font-size:8px;
  letter-spacing:0.06em;cursor:pointer;transition:all 0.15s;text-transform:uppercase;
}
.ens-btn:hover{border-color:var(--ley-1);color:var(--ley-1);}
.ens-btn.active{background:rgba(74,244,200,0.08);border-color:var(--ley-1);color:var(--ley-1);}

/* ── BOTTOM STRIP ── */
.bottom-strip{
  display:flex;align-items:center;gap:14px;padding:6px 16px;
  border-top:0.5px solid var(--border-gold);position:relative;z-index:5;
  background:rgba(5,5,8,0.5);
}
.bottom-strip span{font-size:10px;color:var(--text-muted);letter-spacing:0.08em;}
#viz-canvas{height:26px;flex:1;}

.octave-ctrl{display:flex;align-items:center;gap:6px;}
.oct-btn{
  width:19px;height:19px;background:transparent;
  border:0.5px solid var(--border-gold);border-radius:3px;
  color:var(--gold);font-family:var(--mono);font-size:13px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  line-height:1;transition:background 0.1s;
}
.oct-btn:hover{background:rgba(232,201,122,0.1);}
#oct-val{font-size:11px;color:var(--gold);min-width:12px;text-align:center;}

/* ── SHIMMER PARTICLES ── */
@keyframes shimmer-float{
  0%{transform:translateY(0) translateX(0);opacity:0;}
  20%{opacity:1;}
  80%{opacity:0.7;}
  100%{transform:translateY(-80px) translateX(20px);opacity:0;}
}
.shimmer-p{position:absolute;border-radius:50%;pointer-events:none;animation:shimmer-float linear infinite;}

/* Scrollbar */
.controls-section::-webkit-scrollbar{width:3px;}
.controls-section::-webkit-scrollbar-track{background:transparent;}
.controls-section::-webkit-scrollbar-thumb{background:rgba(232,201,122,0.2);border-radius:2px;}
</style>
</head>
<body>
<div id="sophia-root">
  <canvas id="sophia-bg"></canvas>

  <header>
    <h1>Sophia</h1>
    <span class="sub">VOID DAW — CELESTIAL MODULE</span>
    <span class="mode-tag" id="cur-voice-head">Angelic Choir</span>
    <div class="status-dot"></div>
  </header>

  <div class="main-area">
    <div class="left-col">

      <!-- Voice Display -->
      <div class="voice-display">
        <canvas id="voice-canvas" width="130" height="108"></canvas>
        <div class="voice-info">
          <div id="voice-name">— CELESTIAL ATLAS —</div>
          <div class="vi-row"><span class="vi-label">Mode</span><span class="vi-val gold" id="vi-mode">CHOIR</span></div>
          <div class="vi-row"><span class="vi-label">Voices</span><span class="vi-val" id="vi-voices">—</span></div>
          <div class="vi-row"><span class="vi-label">Shimmer</span><span class="vi-val gold" id="vi-shimmer">—</span></div>
          <div class="vi-row"><span class="vi-label">Breath</span><span class="vi-val pink" id="vi-breath">—</span></div>
          <div class="vi-row"><span class="vi-label">Harmonic</span><span class="vi-val" id="vi-harm">—</span></div>
        </div>
      </div>

      <!-- Mode Tabs -->
      <div class="mode-strip">
        <button class="mode-tab active" id="tab-choir" onclick="setMode('choir')">✦ Choir</button>
        <button class="mode-tab strings" id="tab-strings" onclick="setMode('strings')">♩ Strings</button>
      </div>

      <!-- Keyboard -->
      <div class="keyboard-section">
        <div class="kb-header">
          <span style="font-size:10px;color:var(--text-muted)">OCT <span id="oct-disp">4</span></span>
          <span class="kb-hint">Z–/ · Q–U · ↑↓</span>
        </div>
        <div id="keyboard"></div>
        <div class="env-row">
          <div class="ctrl-group"><label>ATK <span class="val" id="atk-val">0.35</span></label><input type="range" id="atk" min="0.01" max="4" step="0.01" value="0.35"></div>
          <div class="ctrl-group"><label>DEC <span class="val" id="dec-val">0.50</span></label><input type="range" id="dec" min="0.05" max="4" step="0.01" value="0.5"></div>
          <div class="ctrl-group"><label>SUS <span class="val" id="sus-val">0.75</span></label><input type="range" id="sus" min="0" max="1" step="0.01" value="0.75" class="blue"></div>
          <div class="ctrl-group"><label>REL <span class="val" id="rel-val">1.50</span></label><input type="range" id="rel" min="0.1" max="8" step="0.05" value="1.5"></div>
        </div>
      </div>
    </div>

    <!-- Right Controls -->
    <div class="controls-section">

      <div>
        <div class="section-head">Voice Preset</div>
        <div class="voices-grid" id="choir-voices">
          <button class="voice-btn active" data-preset="angelic">Angelic</button>
          <button class="voice-btn" data-preset="cathedral">Cathedral</button>
          <button class="voice-btn" data-preset="ethereal">Ethereal</button>
          <button class="voice-btn" data-preset="soprano">Soprano</button>
        </div>
        <div class="voices-grid" id="strings-voices" style="display:none;">
          <button class="voice-btn str" data-preset="celestial-str">Celestial</button>
          <button class="voice-btn str" data-preset="lush">Lush</button>
          <button class="voice-btn str" data-preset="tremolo">Tremolo</button>
          <button class="voice-btn str" data-preset="pizz">Pizzicato</button>
        </div>
      </div>

      <div>
        <div class="section-head">Ensemble</div>
        <div class="ensemble-row">
          <button class="ens-btn" id="ens-uni">UNI</button>
          <button class="ens-btn active" id="ens-oct">OCT</button>
          <button class="ens-btn" id="ens-5th">5TH</button>
        </div>
      </div>

      <div class="ctrl-group">
        <label>SHIMMER <span class="val gold" id="shim-val">0.45</span></label>
        <input type="range" id="shim" min="0" max="1" step="0.01" value="0.45">
      </div>

      <div class="ctrl-group">
        <label>BREATH <span class="val pink" id="brth-val">0.30</span></label>
        <input type="range" id="brth" min="0" max="1" step="0.01" value="0.30" class="pink">
      </div>

      <div class="ctrl-group">
        <label>WARMTH <span class="val gold" id="warm-val">1400</span></label>
        <input type="range" id="warm" min="400" max="6000" step="50" value="1400">
      </div>

      <div class="ctrl-group">
        <label>VIBRATO <span class="val" id="vib-val">0.28</span></label>
        <input type="range" id="vib" min="0" max="1" step="0.01" value="0.28" class="blue">
      </div>

      <div class="ctrl-group">
        <label>REVERB <span class="val" id="rev-val">0.60</span></label>
        <input type="range" id="rev" min="0" max="1" step="0.01" value="0.6" class="blue">
      </div>

      <div class="ctrl-group">
        <label>VOLUME <span class="val gold" id="vol-val">0.70</span></label>
        <input type="range" id="vol" min="0" max="1" step="0.01" value="0.7"></div>
    </div>
  </div>

  <div class="bottom-strip">
    <span>SOPHIA v1.0</span>
    <canvas id="viz-canvas"></canvas>
    <div class="octave-ctrl">
      <button class="oct-btn" id="oct-dn">−</button>
      <span id="oct-val">4</span>
      <button class="oct-btn" id="oct-up">+</button>
    </div>
  </div>
</div>

<script>
(function(){
'use strict';

// ── COLOUR PALETTE ────────────────────────────────────────────────────────────
const C = {
  void:'#050508', gold:'#e8c97a', celestial:'#b8d4ff',
  ley1:'#4af4c8', ley2:'#7b6fff', ley3:'#f45a8d',
  goldA:(a)=>`rgba(232,201,122,${a})`,
  celA:(a)=>`rgba(184,212,255,${a})`,
  ley1A:(a)=>`rgba(74,244,200,${a})`,
};

// ── AUDIO ENGINE ──────────────────────────────────────────────────────────────
let actx, masterGain, filter, convolver, reverbGain, dryGain, vibratoLFO;
let analyser, vizBuf;
const activeNotes = {};
let octave = 4;
let currentMode = 'choir';
let currentPreset = 'angelic';
let ensembleMode = 'oct'; // uni / oct / 5th
let vibratoDepth = 0.28;

// Preset configs
const PRESETS = {
  angelic:   { wave:'sine',   detune:8,  voices:3, breathAmt:0.3,  warmth:1400, shimmer:0.45, label:'Angelic Choir' },
  cathedral: { wave:'sine',   detune:5,  voices:5, breathAmt:0.2,  warmth:900,  shimmer:0.6,  label:'Cathedral' },
  ethereal:  { wave:'sine',   detune:14, voices:4, breathAmt:0.5,  warmth:2000, shimmer:0.8,  label:'Ethereal Voices' },
  soprano:   { wave:'triangle',detune:3, voices:2, breathAmt:0.15, warmth:3000, shimmer:0.25, label:'Soprano Solo' },
  'celestial-str':{ wave:'sawtooth',detune:6,  voices:4, breathAmt:0.1, warmth:1200, shimmer:0.35, label:'Celestial Strings' },
  lush:      { wave:'sawtooth',detune:10, voices:5, breathAmt:0.08, warmth:1800, shimmer:0.5,  label:'Lush Strings' },
  tremolo:   { wave:'sawtooth',detune:4,  voices:3, breathAmt:0.04, warmth:1400, shimmer:0.7,  label:'Tremolo Strings' },
  pizz:      { wave:'triangle',detune:2,  voices:2, breathAmt:0.02, warmth:3500, shimmer:0.1,  label:'Pizzicato' },
};

function getP(){ return PRESETS[currentPreset] || PRESETS.angelic; }

function initAudio(){
  if(actx) return;
  actx = new (window.AudioContext || window.webkitAudioContext)();

  masterGain = actx.createGain(); masterGain.gain.value = 0.7;
  filter = actx.createBiquadFilter(); filter.type = 'lowpass';
  filter.frequency.value = parseFloat(document.getElementById('warm').value);
  filter.Q.value = 1.2;

  // Big reverb for cathedral feel
  convolver = actx.createConvolver();
  const len = actx.sampleRate * 4.5;
  const buf = actx.createBuffer(2, len, actx.sampleRate);
  for(let c = 0; c < 2; c++){
    const d = buf.getChannelData(c);
    for(let i = 0; i < len; i++){
      d[i] = (Math.random()*2-1) * Math.pow(1 - i/len, 1.6);
    }
  }
  convolver.buffer = buf;

  reverbGain = actx.createGain(); reverbGain.gain.value = 0.6;
  dryGain    = actx.createGain(); dryGain.gain.value = 0.5;

  filter.connect(dryGain);
  filter.connect(convolver);
  convolver.connect(reverbGain);
  dryGain.connect(masterGain);
  reverbGain.connect(masterGain);
  masterGain.connect(actx.destination);

  startViz();
}

const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

function noteFreq(note, oct){
  const s = NOTE_NAMES.indexOf(note);
  const n = (oct+1)*12 + s;
  return 440 * Math.pow(2, (n-69)/12);
}

function buildVoiceOsc(freq, detuneCents, breathAmt){
  const p = getP();
  const osc = actx.createOscillator();
  osc.type = p.wave;
  osc.frequency.value = freq;
  osc.detune.value = detuneCents;

  // Vibrato LFO per note
  const lfo = actx.createOscillator();
  const lfoGain = actx.createGain();
  lfo.frequency.value = 4.8 + Math.random()*1.2;
  lfoGain.gain.value = 0; // ramp up
  lfo.connect(lfoGain); lfoGain.connect(osc.frequency);
  lfo.start();
  // ramp vibrato in
  const vd = vibratoDepth * freq * 0.012;
  lfoGain.gain.setValueAtTime(0, actx.currentTime + 0.4);
  lfoGain.gain.linearRampToValueAtTime(vd, actx.currentTime + 1.2);

  // Noise for breath
  let noiseNode = null;
  if(breathAmt > 0.02){
    const nbuf = actx.createBuffer(1, actx.sampleRate * 0.5, actx.sampleRate);
    const nd = nbuf.getChannelData(0);
    for(let i=0;i<nd.length;i++) nd[i] = Math.random()*2-1;
    noiseNode = actx.createBufferSource(); noiseNode.buffer = nbuf; noiseNode.loop = true;
    const nf = actx.createBiquadFilter(); nf.type='bandpass'; nf.frequency.value = freq*1.5; nf.Q.value=0.5;
    const ng = actx.createGain(); ng.gain.value = breathAmt * 0.08;
    noiseNode.connect(nf); nf.connect(ng);
    noiseNode.start();
    return { osc, lfo, noiseNode, noiseGain: ng };
  }
  return { osc, lfo, noiseNode: null, noiseGain: null };
}

function playNote(note, oct){
  initAudio();
  const id = note + oct;
  if(activeNotes[id]) return;

  const p = getP();
  const freq = noteFreq(note, oct);
  const atk  = parseFloat(document.getElementById('atk').value);
  const dec  = parseFloat(document.getElementById('dec').value);
  const sus  = parseFloat(document.getElementById('sus').value);
  const det  = p.detune;
  const breathAmt = parseFloat(document.getElementById('brth').value);

  masterGain.gain.setTargetAtTime(
    parseFloat(document.getElementById('vol').value), actx.currentTime, 0.02
  );

  const voices = [];
  const freqs = [freq];

  // Ensemble harmony
  if(ensembleMode === 'oct') freqs.push(freq * 2);
  if(ensembleMode === '5th') freqs.push(freq * 1.4983);

  // Multiple unison voices per freq with micro-detune
  freqs.forEach((f, fi) => {
    const numV = fi === 0 ? p.voices : 2;
    for(let v = 0; v < numV; v++){
      const d = (v - (numV-1)/2) * det + (Math.random()-0.5)*2;
      const env = actx.createGain();
      const vol = fi === 0 ? 1 : 0.45;
      env.gain.setValueAtTime(0, actx.currentTime);
      env.gain.linearRampToValueAtTime(0.7 * vol, actx.currentTime + atk);
      env.gain.linearRampToValueAtTime(sus * 0.7 * vol, actx.currentTime + atk + dec);

      const { osc, lfo, noiseNode, noiseGain } = buildVoiceOsc(f, d, breathAmt);
      osc.connect(env);
      if(noiseNode && noiseGain) noiseGain.connect(env);
      env.connect(filter);
      osc.start();
      voices.push({ osc, lfo, env, noiseNode });
    }
  });

  activeNotes[id] = voices;
  flashKey(note, oct, true);
  spawnShimmer(note, oct);
}

function releaseNote(note, oct){
  const id = note + oct;
  const voices = activeNotes[id];
  if(!voices) return;
  const rel = parseFloat(document.getElementById('rel').value);
  voices.forEach(v => {
    v.env.gain.cancelScheduledValues(actx.currentTime);
    v.env.gain.setValueAtTime(v.env.gain.value, actx.currentTime);
    v.env.gain.linearRampToValueAtTime(0, actx.currentTime + rel);
    v.osc.stop(actx.currentTime + rel + 0.1);
    v.lfo.stop(actx.currentTime + rel + 0.1);
    if(v.noiseNode) v.noiseNode.stop(actx.currentTime + rel + 0.1);
  });
  delete activeNotes[id];
  flashKey(note, oct, false);
}

function flashKey(note, oct2, on){
  const k = document.querySelector(`[data-note="${note}"][data-oct="${oct2}"]`);
  if(k) on ? k.classList.add('active') : k.classList.remove('active');
}

// ── SHIMMER PARTICLES ─────────────────────────────────────────────────────────
function spawnShimmer(note, oct2){
  const root = document.getElementById('sophia-root');
  const kb = document.getElementById('keyboard');
  const kbRect = kb.getBoundingClientRect();
  const rootRect = root.getBoundingClientRect();
  for(let i=0;i<7;i++){
    const p = document.createElement('div');
    p.className = 'shimmer-p';
    const x = kbRect.left - rootRect.left + Math.random()*kbRect.width;
    const y = kbRect.top - rootRect.top + Math.random()*40;
    const size = 1.5 + Math.random()*3;
    const dur = 1.2 + Math.random()*1.5;
    const isGold = Math.random()>0.5;
    p.style.cssText=`left:${x}px;top:${y}px;width:${size}px;height:${size}px;
      background:${isGold?C.gold:C.celestial};
      box-shadow:0 0 ${size*2}px ${isGold?C.gold:C.celestial};
      animation-duration:${dur}s;animation-delay:${i*0.08}s;`;
    root.appendChild(p);
    setTimeout(()=>p.remove(), (dur+i*0.08)*1000+100);
  }
}

// ── VOICE CANVAS (harmonic rings) ─────────────────────────────────────────────
const vc = document.getElementById('voice-canvas');
const vctx = vc.getContext('2d');
let vcTime = 0;

function drawVoiceCanvas(){
  const W = 130, H = 108, cx = W/2, cy = H/2;
  vctx.clearRect(0,0,W,H);

  // Dark bg
  const bg = vctx.createRadialGradient(cx, cy, 10, cx, cy, 58);
  bg.addColorStop(0, 'rgba(10,8,20,0.95)');
  bg.addColorStop(1, 'rgba(2,2,8,0.98)');
  vctx.fillStyle = bg; vctx.fillRect(0,0,W,H);

  const isChoir = currentMode === 'choir';
  const accent = isChoir ? C.gold : C.celestial;
  const accentA = isChoir ? C.goldA : C.celA;

  // Outer glow ring
  vctx.beginPath();
  vctx.arc(cx, cy, 48, 0, Math.PI*2);
  vctx.strokeStyle = accentA(0.12);
  vctx.lineWidth = 8;
  vctx.stroke();

  // Harmonic rings (like vocal harmonics)
  const p = getP();
  const numRings = p.voices;
  for(let r=0; r<numRings; r++){
    const phase = vcTime * (0.3 + r*0.15) + r * (Math.PI*2/numRings);
    const rad = 18 + r*7 + Math.sin(vcTime*0.8 + r)*2;
    const alpha = 0.15 + 0.1 * Math.sin(vcTime + r*1.3);

    vctx.beginPath();
    vctx.arc(cx, cy, rad, 0, Math.PI*2);
    vctx.strokeStyle = accentA(alpha);
    vctx.lineWidth = 0.5;
    vctx.stroke();
  }

  // Animated petal / rose curve
  vctx.beginPath();
  const k = isChoir ? 4 : 3;
  for(let a=0; a<360; a++){
    const rad2 = Math.toRadians ? Math.toRadians(a) : a * Math.PI/180;
    const r2 = 36 * Math.cos(k*rad2 + vcTime*0.4);
    const x = cx + r2 * Math.cos(rad2);
    const y = cy + r2 * Math.sin(rad2);
    a === 0 ? vctx.moveTo(x,y) : vctx.lineTo(x,y);
  }
  vctx.strokeStyle = accentA(0.22);
  vctx.lineWidth = 0.6;
  vctx.stroke();

  // Central orb
  const orb = vctx.createRadialGradient(cx-4, cy-4, 1, cx, cy, 12);
  orb.addColorStop(0, isChoir ? 'rgba(255,240,200,0.9)' : 'rgba(200,220,255,0.9)');
  orb.addColorStop(0.5, accentA(0.6));
  orb.addColorStop(1, accentA(0));
  vctx.beginPath();
  vctx.arc(cx, cy, 12, 0, Math.PI*2);
  vctx.fillStyle = orb; vctx.fill();

  // Floating motes
  const hasActive = Object.keys(activeNotes).length > 0;
  for(let m=0; m<(hasActive?8:3); m++){
    const mAngle = vcTime * (0.5 + m*0.12) + m*0.8;
    const mR = 22 + m*4 + Math.sin(vcTime*1.2 + m)*5;
    const mx = cx + mR * Math.cos(mAngle);
    const my = cy + mR * Math.sin(mAngle);
    const ms = 1.5 + Math.sin(vcTime*2 + m)*0.5;
    vctx.beginPath();
    vctx.arc(mx, my, ms, 0, Math.PI*2);
    vctx.fillStyle = accentA(0.5 + 0.3*Math.sin(vcTime+m));
    vctx.fill();
  }

  // Rim
  vctx.beginPath();
  vctx.arc(cx, cy, 62, 0, Math.PI*2);
  vctx.strokeStyle = accentA(0.25);
  vctx.lineWidth = 0.6;
  vctx.stroke();

  vcTime += 0.012;
  requestAnimationFrame(drawVoiceCanvas);
}

function updateVoiceStats(){
  const p = getP();
  const shim = parseFloat(document.getElementById('shim').value);
  const brth = parseFloat(document.getElementById('brth').value);
  const harm = ['2nd','3rd','4th','5th'][Math.floor((Math.sin(vcTime*0.3)+1)*1.9)];
  document.getElementById('vi-mode').textContent = currentMode.toUpperCase();
  document.getElementById('vi-voices').textContent = p.voices + (ensembleMode!=='uni'?' +ens':'');
  document.getElementById('vi-shimmer').textContent = (shim*100).toFixed(0)+'%';
  document.getElementById('vi-breath').textContent = (brth*100).toFixed(0)+'%';
  document.getElementById('vi-harm').textContent = harm;
  document.getElementById('voice-name').textContent = p.label;
  document.getElementById('cur-voice-head').textContent = p.label;
}
setInterval(updateVoiceStats, 120);

// ── BACKGROUND CANVAS ────────────────────────────────────────────────────────
function drawBg(){
  const c = document.getElementById('sophia-bg');
  const g = c.getContext('2d');
  const W = c.parentElement.offsetWidth || 700;
  const H = c.parentElement.offsetHeight || 640;
  c.width = W; c.height = H;
  g.clearRect(0,0,W,H);

  // Celestial radial wash
  const rad = g.createRadialGradient(W*0.5, H*0.3, 0, W*0.5, H*0.5, W*0.7);
  rad.addColorStop(0, 'rgba(232,201,122,0.03)');
  rad.addColorStop(0.4, 'rgba(184,212,255,0.02)');
  rad.addColorStop(1, 'rgba(0,0,0,0)');
  g.fillStyle = rad; g.fillRect(0,0,W,H);

  // Subtle diagonal lines
  const lines = [
    {x1:.05*W,y1:0,x2:.6*W,y2:H,col:'rgba(232,201,122,0.04)'},
    {x1:.3*W, y1:0,x2:.9*W,y2:H,col:'rgba(184,212,255,0.03)'},
    {x1:.7*W, y1:0,x2:.1*W,y2:H,col:'rgba(232,201,122,0.03)'},
    {x1:0,y1:.2*H,x2:W,y2:.7*H,col:'rgba(184,212,255,0.025)'},
  ];
  lines.forEach(l=>{
    g.beginPath(); g.strokeStyle=l.col; g.lineWidth=0.5;
    g.moveTo(l.x1,l.y1); g.lineTo(l.x2,l.y2); g.stroke();
  });
}

// ── WAVEFORM VIZ ─────────────────────────────────────────────────────────────
function startViz(){
  analyser = actx.createAnalyser(); analyser.fftSize = 512;
  masterGain.connect(analyser);
  vizBuf = new Uint8Array(analyser.frequencyBinCount);
  drawViz();
}

function drawViz(){
  const c = document.getElementById('viz-canvas');
  const vc2 = c.getContext('2d');
  c.width = c.offsetWidth * (window.devicePixelRatio||1) || 300;
  c.height = 26 * (window.devicePixelRatio||1);
  vc2.scale(window.devicePixelRatio||1, window.devicePixelRatio||1);
  const W = c.offsetWidth, H = 26;
  (function frame(){
    requestAnimationFrame(frame);
    if(!analyser) return;
    analyser.getByteTimeDomainData(vizBuf);
    vc2.clearRect(0,0,W,H);
    const isChoir = currentMode === 'choir';
    const col = isChoir ? 'rgba(232,201,122,0.7)' : 'rgba(184,212,255,0.7)';
    vc2.strokeStyle = col; vc2.lineWidth = 1; vc2.beginPath();
    const sl = W / vizBuf.length;
    for(let i=0;i<vizBuf.length;i++){
      const x = i*sl, y = (vizBuf[i]/128-1)*(H/2) + H/2;
      i===0 ? vc2.moveTo(x,y) : vc2.lineTo(x,y);
    }
    vc2.stroke();
  })();
}

// ── KEYBOARD ─────────────────────────────────────────────────────────────────
const WHITE = ['C','D','E','F','G','A','B'];
const BOFFS = {'C#':1,'D#':2,'F#':4,'G#':5,'A#':6};

function buildKeyboard(){
  const kb = document.getElementById('keyboard'); kb.innerHTML = '';
  const total = 14, pct = 100/total;
  let wi = 0;
  for(let o=0;o<2;o++) WHITE.forEach(n=>{
    const k = document.createElement('div'); k.className='wkey';
    k.style.left = (wi*pct)+'%'; k.style.width = (pct-0.3)+'%';
    k.dataset.note = n; k.dataset.oct = octave+o;
    k.textContent = n+(octave+o);
    k.addEventListener('mousedown', e=>{e.preventDefault(); playNote(n, octave+o);});
    k.addEventListener('mouseup', ()=>releaseNote(n, octave+o));
    k.addEventListener('mouseleave', ()=>releaseNote(n, octave+o));
    kb.appendChild(k); wi++;
  });
  NOTE_NAMES.filter(n=>n.includes('#')).forEach(bn=>{
    for(let o=0;o<2;o++){
      const oct2 = octave+o;
      const offKeys = Object.keys(BOFFS), offVals = Object.values(BOFFS);
      const bi = offKeys.indexOf(bn), wIdx = o*7 + offVals[bi]-1;
      const k = document.createElement('div'); k.className='bkey';
      k.style.left = (wIdx*pct + pct*0.65)+'%'; k.style.width = (pct*0.62)+'%';
      k.dataset.note = bn; k.dataset.oct = oct2;
      k.addEventListener('mousedown', e=>{e.preventDefault(); playNote(bn, oct2);});
      k.addEventListener('mouseup', ()=>releaseNote(bn, oct2));
      k.addEventListener('mouseleave', ()=>releaseNote(bn, oct2));
      kb.appendChild(k);
    }
  });
}

// ── KEYBOARD BINDINGS ─────────────────────────────────────────────────────────
const KEY_MAP = {
  'z':'C','s':'C#','x':'D','d':'D#','c':'E','v':'F','g':'F#','b':'G','h':'G#','n':'A','j':'A#','m':'B',
  'q':'C','2':'C#','w':'D','3':'D#','e':'E','r':'F','5':'F#','t':'G','6':'G#','y':'A','7':'A#','u':'B'
};
const KEY_OCT = {
  'z':0,'s':0,'x':0,'d':0,'c':0,'v':0,'g':0,'b':0,'h':0,'n':0,'j':0,'m':0,
  'q':1,'2':1,'w':1,'3':1,'e':1,'r':1,'5':1,'t':1,'6':1,'y':1,'7':1,'u':1
};
const pressedKeys = new Set();

document.addEventListener('keydown', e=>{
  if(e.repeat) return;
  const k = e.key.toLowerCase();
  if(k==='arrowup'||k==='arrowdown'){
    octave = Math.max(0, Math.min(8, octave+(k==='arrowup'?1:-1)));
    document.getElementById('oct-val').textContent = octave;
    document.getElementById('oct-disp').textContent = octave;
    buildKeyboard(); return;
  }
  if(KEY_MAP[k] && !pressedKeys.has(k)){
    pressedKeys.add(k); playNote(KEY_MAP[k], octave+KEY_OCT[k]);
  }
});
document.addEventListener('keyup', e=>{
  const k = e.key.toLowerCase();
  if(KEY_MAP[k]){ pressedKeys.delete(k); releaseNote(KEY_MAP[k], octave+KEY_OCT[k]); }
});

// ── MODE / PRESET ─────────────────────────────────────────────────────────────
window.setMode = function(mode){
  currentMode = mode;
  document.getElementById('tab-choir').classList.toggle('active', mode==='choir');
  document.getElementById('tab-strings').classList.toggle('active', mode==='strings');
  document.getElementById('choir-voices').style.display = mode==='choir' ? 'grid' : 'none';
  document.getElementById('strings-voices').style.display = mode==='strings' ? 'grid' : 'none';

  // Auto-select first preset of mode
  const first = mode==='choir' ? 'angelic' : 'celestial-str';
  applyPreset(first);
  document.querySelectorAll('.voice-btn').forEach(b=>b.classList.remove('active'));
  const fb = document.querySelector(`[data-preset="${first}"]`);
  if(fb) fb.classList.add('active');
};

function applyPreset(name){
  currentPreset = name;
  const p = PRESETS[name];
  if(!p) return;
  // Sync sliders to preset defaults
  const s_shim = document.getElementById('shim');
  const s_brth = document.getElementById('brth');
  const s_warm = document.getElementById('warm');
  s_shim.value = p.shimmer; document.getElementById('shim-val').textContent = p.shimmer.toFixed(2);
  s_brth.value = p.breathAmt; document.getElementById('brth-val').textContent = p.breathAmt.toFixed(2);
  s_warm.value = p.warmth; document.getElementById('warm-val').textContent = p.warmth;
  if(filter) filter.frequency.value = p.warmth;

  // ATK defaults by preset type
  const isString = ['celestial-str','lush','tremolo','pizz'].includes(name);
  const atkDef = isString ? '0.15' : '0.35';
  const relDef = isString ? '0.8' : '1.5';
  document.getElementById('atk').value = atkDef;
  document.getElementById('atk-val').textContent = atkDef;
  document.getElementById('rel').value = relDef;
  document.getElementById('rel-val').textContent = relDef;
}

document.querySelectorAll('.voice-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.voice-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    applyPreset(btn.dataset.preset);
  });
});

// ── ENSEMBLE ──────────────────────────────────────────────────────────────────
document.querySelectorAll('.ens-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.ens-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    ensembleMode = btn.id.replace('ens-','');
  });
});

// ── SLIDERS ──────────────────────────────────────────────────────────────────
function bindSlider(id, valId, dec, cb){
  const sl = document.getElementById(id), vl = document.getElementById(valId);
  sl.addEventListener('input', ()=>{
    vl.textContent = parseFloat(sl.value).toFixed(dec);
    if(cb) cb(parseFloat(sl.value));
  });
}
bindSlider('atk','atk-val',2);
bindSlider('dec','dec-val',2);
bindSlider('sus','sus-val',2);
bindSlider('rel','rel-val',2);
bindSlider('shim','shim-val',2, v=>{
  if(reverbGain){ reverbGain.gain.value = 0.3 + v*0.6; dryGain.gain.value = 0.7 - v*0.3; }
});
bindSlider('brth','brth-val',2);
bindSlider('warm','warm-val',0, v=>{ if(filter) filter.frequency.value=v; });
bindSlider('vib','vib-val',2, v=>{ vibratoDepth=v; });
bindSlider('rev','rev-val',2, v=>{ if(reverbGain){ reverbGain.gain.value=v; dryGain.gain.value=1-v*0.6; }});
bindSlider('vol','vol-val',2, v=>{ if(masterGain) masterGain.gain.value=v; });

document.getElementById('oct-up').addEventListener('click', ()=>{
  octave = Math.min(8, octave+1);
  document.getElementById('oct-val').textContent = octave;
  document.getElementById('oct-disp').textContent = octave;
  buildKeyboard();
});
document.getElementById('oct-dn').addEventListener('click', ()=>{
  octave = Math.max(0, octave-1);
  document.getElementById('oct-val').textContent = octave;
  document.getElementById('oct-disp').textContent = octave;
  buildKeyboard();
});

// ── TREMOLO (for tremolo preset) ──────────────────────────────────────────────
// Handled via shimmer animation in voice canvas pulse rate variation

// ── INIT ─────────────────────────────────────────────────────────────────────
buildKeyboard();
drawVoiceCanvas();
setTimeout(()=>{ drawBg(); }, 80);
window.addEventListener('resize', drawBg);

})();
